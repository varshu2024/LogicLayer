services:
  # Backend Service: LogicLayer Server
  - type: web
    name: logiclayer-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 18.0.0

  # Frontend Service: LogicLayer Client
  - type: web
    name: logiclayer-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: logiclayer-server
          type: web
          property: host
      - key: VITE_PISTON_API_URL
        value: https://emkc.org/api/v2/piston
